<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Learning</title>
</head>

<body>

    <form>
        <input required minlength="3" type="text" placeholder="name" id="name">
        <div id="hidden" style="display: none;">
            
            <small style="color: red; font-size: 12px;"> your name should be greater than 2 characters </small>
        </div>
        <br> <br>

        <input type=ad"email" placeholder="email" id="email">
        <br>  <br>

        <input type="password" id="password">

        <br> <br>

        <select>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Others">Others</option>
        </select>
        <br> <br>

        <textarea placeholder="Tell us about yourself..."></textarea>
        <br> <br>
        <input type="submit">
    </form>

    <script src="form.js"></script>
</body>

</html>
